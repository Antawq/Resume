<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="darkreader-lock">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="A portfolio in progress for two students">
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <link rel="canonical" href="https://antawkay.com/">
    <title>Antawkay Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="startup-overlay" aria-hidden="true"></div>
    <div id="brightness-overlay" aria-hidden="true"></div>
    <!-- Панель сверху -->
    <div class="menu-bar" role="banner">
        <div class="datetime" id="datetime" role="timer" aria-live="off"></div>
    </div>

    <!-- Рабочий стол -->
    <main class="desktop" id="desktop" role="main" aria-label="Desktop">
        <div class="file folder" data-type="projects" tabindex="0" role="button" aria-label="Open Projects folder">
            <div class="file-icon">
                <img src="icons/folder-icon.webp" alt="" aria-hidden="true" class="folder-icon" fetchpriority="high">
            </div>
            <span>Projects</span>
        </div>
        <div class="file folder" data-type="photos" tabindex="0" role="button" aria-label="Open Photos folder">
            <div class="file-icon">
                <img src="icons/folder-icon.webp" alt="" aria-hidden="true" class="folder-icon" fetchpriority="high">
            </div>
            <span>Photos</span>
        </div>
        <div class="file" data-type="text" tabindex="0" role="button" aria-label="Open About.txt file">
            <div class="file-icon">
                <img src="icons/icon-text.webp" alt="" aria-hidden="true" class="text-icon" fetchpriority="high">
            </div>
            <span>About.txt</span>
        </div>
    </main>

    <!-- Окно — шаблон, клонируется JS на каждое открытое приложение -->
    <template id="window-template">
        <div class="window" role="dialog">
            <div class="window-header">
                <div class="window-controls">
                    <button class="window-control close" aria-label="Close window" type="button">
                    </button>
                </div>
                <span class="window-title">Window</span>
            </div>
            <div class="window-content" role="document">
                <!-- Рендер JS для содержимого окна -->
            </div>
            <div class="window-resize-handle n" data-dir="n" aria-hidden="true"></div>
            <div class="window-resize-handle s" data-dir="s" aria-hidden="true"></div>
            <div class="window-resize-handle e" data-dir="e" aria-hidden="true"></div>
            <div class="window-resize-handle w" data-dir="w" aria-hidden="true"></div>
            <div class="window-resize-handle ne" data-dir="ne" aria-hidden="true"></div>
            <div class="window-resize-handle nw" data-dir="nw" aria-hidden="true"></div>
            <div class="window-resize-handle se" data-dir="se" aria-hidden="true"></div>
            <div class="window-resize-handle sw" data-dir="sw" aria-hidden="true"></div>
        </div>
    </template>

    <!-- Dock -->
    <nav class="dock" role="navigation" aria-label="Application dock">
        <button class="dock-item" data-type="calls" aria-label="Open Recent Calls">
            <img src="icons/phone.webp" alt="" aria-hidden="true" class="dock-icon" fetchpriority="high">
            <span class="dock-tooltip">Recent Calls</span>
        </button>
        <button class="dock-item" data-type="github" aria-label="Open GitHub">
            <img src="icons/github.webp" alt="" aria-hidden="true" class="dock-icon" fetchpriority="high">
            <span class="dock-tooltip">GitHub</span>
        </button>
        <button class="dock-item" data-type="telegram" aria-label="Open Telegram">
            <img src="icons/telegram.webp" alt="" aria-hidden="true" class="dock-icon" fetchpriority="high">
            <span class="dock-tooltip">Telegram</span>
        </button>
        <button class="dock-item" data-type="instagram" aria-label="Open Instagram">
            <img src="icons/instagram.webp" alt="" aria-hidden="true" class="dock-icon" fetchpriority="high">
            <span class="dock-tooltip">Instagram</span>
        </button>
        <button class="dock-item" data-type="notes" aria-label="Open Notes">
            <img src="icons/notepad.webp" alt="" aria-hidden="true" class="dock-icon" fetchpriority="high">
            <span class="dock-tooltip">Notes</span>
        </button>
        <button class="dock-item" data-type="trash" aria-label="Open Trash">
            <img src="icons/trash.webp" alt="" aria-hidden="true" class="dock-icon" fetchpriority="high">
            <span class="dock-tooltip">Trash</span>
        </button>
    </nav>

    <!-- Скрипты -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
